name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to resend release notes for (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release-branch:
    name: Release (branch)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'release/v')
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        id: release
        run: |
          VERSION="${{ github.head_ref }}"
          VERSION="${VERSION#release/}"

          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)

          if [ -n "$LATEST" ]; then
            TAG_DATE=$(git log -1 --format=%cI "refs/tags/${LATEST}")
            PRS=$(gh pr list --state merged --base main --search "merged:>${TAG_DATE}" --json number,title --limit 100)
          else
            PRS=$(gh pr list --state merged --base main --json number,title --limit 100)
          fi

          generate_section() {
            local prefix="$1" heading="$2"
            local items
            items=$(echo "$PRS" | jq -r --arg p "$prefix" \
              '.[] | select(.title | test("^" + $p + "\\b"; "i")) | "- \(.title) (#\(.number))"')
            if [ -n "$items" ]; then
              printf "## %s\n%s\n\n" "$heading" "$items"
            fi
          }

          NOTES_FILE=$(mktemp)
          {
            generate_section "feat"     "Features"
            generate_section "fix"      "Bug Fixes"
            generate_section "chore"    "Maintenance"
            generate_section "docs"     "Documentation"
            generate_section "refactor" "Refactoring"
            generate_section "perf"     "Performance"
            generate_section "style"    "Styling"
            generate_section "test"     "Tests"
            generate_section "ci"       "CI"
            generate_section "build"    "Build"

            KNOWN="feat|fix|chore|docs|refactor|perf|style|test|ci|build"
            OTHERS=$(echo "$PRS" | jq -r --arg p "$KNOWN" \
              '.[] | select(.title | test("^(" + $p + ")\\b"; "i") | not) | "- \(.title) (#\(.number))"')
            if [ -n "$OTHERS" ]; then
              printf "## Other Changes\n%s\n" "$OTHERS"
            fi
          } > "$NOTES_FILE"

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file "$NOTES_FILE"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  patch-release:
    name: Release (patch)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, 'release/v')
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch and create release
        id: release
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST" ]; then
            VERSION="v0.0.1"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          if [ -n "$LATEST" ]; then
            TAG_DATE=$(git log -1 --format=%cI "refs/tags/${LATEST}")
            PRS=$(gh pr list --state merged --base main --search "merged:>${TAG_DATE}" --json number,title --limit 100)
          else
            PRS=$(gh pr list --state merged --base main --json number,title --limit 100)
          fi

          generate_section() {
            local prefix="$1" heading="$2"
            local items
            items=$(echo "$PRS" | jq -r --arg p "$prefix" \
              '.[] | select(.title | test("^" + $p + "\\b"; "i")) | "- \(.title) (#\(.number))"')
            if [ -n "$items" ]; then
              printf "## %s\n%s\n\n" "$heading" "$items"
            fi
          }

          NOTES_FILE=$(mktemp)
          {
            generate_section "feat"     "Features"
            generate_section "fix"      "Bug Fixes"
            generate_section "chore"    "Maintenance"
            generate_section "docs"     "Documentation"
            generate_section "refactor" "Refactoring"
            generate_section "perf"     "Performance"
            generate_section "style"    "Styling"
            generate_section "test"     "Tests"
            generate_section "ci"       "CI"
            generate_section "build"    "Build"

            KNOWN="feat|fix|chore|docs|refactor|perf|style|test|ci|build"
            OTHERS=$(echo "$PRS" | jq -r --arg p "$KNOWN" \
              '.[] | select(.title | test("^(" + $p + ")\\b"; "i") | not) | "- \(.title) (#\(.number))"')
            if [ -n "$OTHERS" ]; then
              printf "## Other Changes\n%s\n" "$OTHERS"
            fi
          } > "$NOTES_FILE"

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file "$NOTES_FILE"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Email release notes
    runs-on: ubuntu-latest
    needs: [release-branch, patch-release]
    if: >-
      always() &&
      (needs.release-branch.result == 'success' || needs.patch-release.result == 'success')
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ needs.release-branch.result }}" == "success" ]; then
            echo "version=${{ needs.release-branch.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ needs.patch-release.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Fetch release notes
        id: notes
        run: |
          BODY=$(gh api repos/${{ github.repository }}/releases/tags/${{ steps.version.outputs.version }} --jq '.body')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Juno ${{ steps.version.outputs.version }} released"
          to: ${{ vars.RELEASE_RECIPIENTS }}
          from: Juno <${{ secrets.MAIL_USERNAME }}>
          body: ${{ steps.notes.outputs.body }}

  notify-manual:
    name: Email release notes (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Fetch release notes
        id: notes
        run: |
          BODY=$(gh api repos/${{ github.repository }}/releases/tags/${{ inputs.version }} --jq '.body')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Juno ${{ inputs.version }} released"
          to: ${{ vars.RELEASE_RECIPIENTS }}
          from: Juno <${{ secrets.MAIL_USERNAME }}>
          body: ${{ steps.notes.outputs.body }}
